name: test

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: shogo82148/actions-setup-perl@v1
        with:
          perl-version: '5.40'

      - name: Install dependencies
        run: |
          cpanm --notest --installdeps .

      - name: Run tests
        run: |
          prove -lr t

  docker:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build -t zengin-pl-api:test .

      - name: Smoke test API
        run: |
          docker run -d --rm --name zengin-pl-api-test -p 5000:8080 -e PORT=8080 zengin-pl-api:test
          trap 'docker rm -f zengin-pl-api-test' EXIT
          sleep 3
          curl -fsS http://127.0.0.1:5000/api/banks/0001 | grep '"code":"0001"'
          curl -fsS http://127.0.0.1:5000/api/banks/0001/branches/001 | grep '"branch"'
          curl -fsS -G --data-urlencode 'name=東京' http://127.0.0.1:5000/api/banks/0001/branches | grep '"branches"'
